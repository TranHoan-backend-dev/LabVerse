# Application Name
spring.application.name=account-service
server.port=8081

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:9001/eureka/,http://localhost:9002/eureka/,http://localhost:9003/eureka/
eureka.instance.prefer-ip-address=true

# Database Configuration (SQL Server)
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=LabVerse_AccountService;encrypt=false}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Google OAuth2 Configuration (For Android Integration)
# Note: Android app handles Google Sign-In flow and sends ID Token to backend
# Backend only verifies the ID Token using the Client ID below
# Make sure this Client ID matches your Android app's OAuth 2.0 credentials
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}

# Email Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Logging
logging.level.com.se1853_jv=DEBUG
logging.level.org.springframework.security=DEBUG

########################################
# ? SWAGGER (SPRINGDOC)
########################################
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

