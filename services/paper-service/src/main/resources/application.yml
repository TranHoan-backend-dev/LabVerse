spring:
  application:
    name: paper-service
  profiles:
    active: dev
  cloud:
    compatibility-verifier:
      enabled: false
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:9001/eureka/,http://localhost:9002/eureka/,http://localhost:9003/eureka/
#      defaultZone: http://localhost:9001/eureka/
  instance:
    prefer-ip-address: true
server:
  port: 0
  servlet:
    context-path: /v1/api
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html