spring.application.name=NOTIFICATION-SERVICE

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.url=jdbc:sqlserver://LAPTOP-HSE5F4RV\\DGHIEU:1433;databaseName=LabVerse_NotificationService;encrypt=false;
spring.datasource.username=sa
spring.datasource.password=123

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

server.port=0

#eureka.client.service-url.defaultZone= http://localhost:9001/eureka/,http://localhost:9002/eureka/,http://localhost:9003/eureka/
eureka.client.service-url.defaultZone= http://localhost:9001/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Notification Queue Config (Database-backed queue)
app.queue.scheduler.enabled=true
app.queue.scheduler.interval=5000
app.queue.batch-size=${NOTIFICATION_QUEUE_BATCH_SIZE:10}

app.firebase-service-account-key=${FIREBASE_SERVICE_ACCOUNT_KEY}


app.jwt.secret-key=${JWT_SECRET}

#Jackson Config
spring.jackson.deserialization.fail-on-unknown-properties=false

# Actuator Config for Eureka health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
eureka.instance.health-check-url-path=/actuator/health
