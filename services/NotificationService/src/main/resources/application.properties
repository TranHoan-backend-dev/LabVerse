spring.application.name=NOTIFICATION-SERVICE
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=LabVerse_NotificationService;encrypt=false;
spring.datasource.username=sa
spring.datasource.password=123

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

server.port=0

eureka.client.service-url.defaultZone= http://localhost:9001/eureka/,http://localhost:9002/eureka/,http://localhost:9003/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance-id:${random.value}}
eureka.client.registry-fetch-interval-seconds=5
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# Notification Queue Config (Database-backed queue)
app.queue.scheduler.enabled=true
app.queue.scheduler.interval=5000
app.queue.batch-size=10

#Firebase Config
app.firebase-service-account-key=classpath:labverse-18297-firebase-adminsdk-fbsvc-77278ce38c.json

#Security / JWT Config
# JWT secret key - PHẢI GIỐNG với AccountService để verify token
# Default value phải match với AccountService application-dev.properties
app.jwt.secret-key=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}

#Jackson Config
spring.jackson.deserialization.fail-on-unknown-properties=false