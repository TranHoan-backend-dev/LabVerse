spring.application.name=GROUP-SERVICE
spring.cloud.compatibility-verifier.enabled=false

#spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
#spring.datasource.url=${DBUri};databaseName=${DBName};encrypt=false;
#spring.datasource.username=${DBUser}
#spring.datasource.password=${DBPassword}
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.hibernate.ddl-auto=validate

server.port=0

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:9001/eureka/,http://localhost:9002/eureka/,http://localhost:9003/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
# Context path
server.servlet.context-path=/v1/api
# Swagger (Springdoc) Configuration
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# JWT Configuration (should match AccountService)
# Use environment variable JWT_SECRET in production
# Do not commit actual secret key to version control
jwt.secret=${JWT_SECRET}