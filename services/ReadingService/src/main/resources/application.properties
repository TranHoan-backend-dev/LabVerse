spring.application.name=READING-WORKFLOW-SERVICE

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.url=jdbc:sqlserver://LAPTOP-H3B9DDNO:1433;databaseName=LabVerse_Reading_Service;encrypt=false;
spring.datasource.username=sa
spring.datasource.password=123

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Use 'create' or 'create-drop' to recreate table, or 'update' after running migration script
spring.jpa.hibernate.ddl-auto=update

server.port=0

# Context path - same as paper-service for Gateway routing compatibility
server.servlet.context-path=/v1/api

eureka.client.service-url.defaultZone=http://localhost:9001/eureka/,http://localhost:9002/eureka/,http://localhost:9003/eureka/
#eureka.client.service-url.defaultZone=http://localhost:9001/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.healthcheck.enabled=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance-id:${random.value}}
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30
# Actuator endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
eureka.instance.status-page-url-path=/actuator/info
eureka.instance.health-check-url-path=/actuator/health

########################################
# ? SWAGGER (SPRINGDOC)
########################################
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
# Use Gateway's Swagger UI instead - access via: http://localhost:8080/swagger-ui.html
# Or access directly via service port with context-path: http://localhost:<port>/v1/api/swagger-ui.html

logging.level.com.se1853_jv=DEBUG
