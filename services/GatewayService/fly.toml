app = "labverse-gateway"
kill_signal = "SIGINT"
kill_timeout = 5

[env]
SERVER_PORT = "8080"
SPRING_PROFILES_ACTIVE = "dev"
EUREKA_CLIENT_SERVICEURL_DEFAULTZONE = "http://labverse-eureka.fly.dev/eureka/"

[[services]]
internal_port = 8080
protocol = "tcp"

[[services.ports]]
handlers = ["http"]
port = 80

[[services.ports]]
handlers = ["tls", "http"]
port = 443

[[services.tcp_checks]]
interval = "15s"
timeout = "2s"
port = 8080