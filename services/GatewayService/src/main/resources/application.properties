########################################
# GATEWAY SERVICE CONFIGURATION
########################################
server.port=8080
spring.application.name=gateway-service
spring.cloud.compatibility-verifier.enabled=false

########################################
# EUREKA CLIENT
########################################
eureka.client.service-url.defaultZone=http://localhost:9001/eureka/,http://localhost:9002/eureka/,http://localhost:9003/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

########################################
# SWAGGER (SPRINGDOC)
########################################
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

########################################
# SPRING CLOUD GATEWAY ROUTES
########################################
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# --- ACCOUNT SERVICE (user, role) ---
spring.cloud.gateway.routes[0].id=account-service
spring.cloud.gateway.routes[0].uri=lb://ACCOUNT-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/v1/api/users/**, /v1/api/roles/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=2

# --- PAPER SERVICE (paper, annotation, tag, citation) ---
spring.cloud.gateway.routes[1].id=paper-service
spring.cloud.gateway.routes[1].uri=lb://PAPER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/v1/api/papers/**, /v1/api/annotations/**, /v1/api/tags/**, /v1/api/citations/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=2

# --- NOTIFICATION SERVICE (notification) ---
spring.cloud.gateway.routes[2].id=notification-service
spring.cloud.gateway.routes[2].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/v1/api/notifications/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=2

# --- READING WORKFLOW SERVICE (reading service) ---
spring.cloud.gateway.routes[3].id=reading-workflow-service
spring.cloud.gateway.routes[3].uri=lb://READING-WORKFLOW-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/v1/api/reading-service/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=3

# --- GROUP SERVICE (collection, team) ---
spring.cloud.gateway.routes[4].id=group-service
spring.cloud.gateway.routes[4].uri=lb://GROUP-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/v1/api/collections/**, /v1/api/teams/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=2
