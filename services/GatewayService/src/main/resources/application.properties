########################################
# ? GATEWAY SERVICE CONFIGURATION
########################################
server.port=8080
spring.application.name=gateway-service
spring.cloud.compatibility-verifier.enabled=false

########################################
# ? EUREKA CLIENT CONFIGURATION
########################################
# Trỏ đến tất cả các instance của Eureka Server để tăng tính sẵn sàng cao
eureka.client.service-url.defaultZone=http://localhost:9001/eureka/,http://localhost:9002/eureka/,http://localhost:9003/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

########################################
# ? SWAGGER (SPRINGDOC)
########################################
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

########################################
# ? SPRING CLOUD GATEWAY DISCOVERY
########################################
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

########################################
# ? SPRING CLOUD GATEWAY ROUTES
# ? FE calls /api/..., Gateway rewrites to /v1/api/...
########################################
# --- ACCOUNT SERVICE ROUTE ---
# (user, role)
spring.cloud.gateway.routes[0].id=account-service
spring.cloud.gateway.routes[0].uri=lb://ACCOUNT-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**, /api/roles/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/(?<segment>.*), /v1/api/${segment}

# --- PAPER SERVICE ROUTE ---
# (paper, annotation, tag, citation)
spring.cloud.gateway.routes[1].id=paper-service
spring.cloud.gateway.routes[1].uri=lb://PAPER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/papers/**, /api/annotations/**, /api/tags/**, /api/citations/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/(?<segment>.*), /v1/api/${segment}

# --- GROUP SERVICE ROUTE ---
# (collection, user)
# Route for /api/collections (exact path or with sub-paths)
spring.cloud.gateway.routes[2].id=group-service-collections
spring.cloud.gateway.routes[2].uri=lb://GROUP-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/collections, /api/collections/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/api/(?<segment>.*), /v1/api/${segment}

# --- GROUP SERVICE USERS ROUTE ---
spring.cloud.gateway.routes[3].id=group-service-users
spring.cloud.gateway.routes[3].uri=lb://GROUP-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/group-users/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/api/(?<segment>.*), /v1/api/${segment}

# --- NOTIFICATION SERVICE ROUTE ---
spring.cloud.gateway.routes[4].id=notification-service
spring.cloud.gateway.routes[4].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/api/(?<segment>.*), /v1/api/${segment}

# --- READING WORKFLOW SERVICE ROUTE ---
# (reading list, reading workflow)
spring.cloud.gateway.routes[5].id=reading-workflow-service
spring.cloud.gateway.routes[5].uri=lb://READING-WORKFLOW-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/reading-lists/**, /api/reading-workflows/**
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/api/(?<segment>.*), /v1/api/${segment}

