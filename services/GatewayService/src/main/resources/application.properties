########################################
# GATEWAY SERVICE CONFIGURATION
########################################
server.port=8080
spring.application.name=gateway-service
spring.cloud.compatibility-verifier.enabled=false

########################################
# EUREKA CLIENT
########################################
eureka.client.service-url.defaultZone=http://localhost:9001/eureka/,http://localhost:9002/eureka/,http://localhost:9003/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Refresh registry more frequently ?? ph�t hi?n service m?i nhanh h?n
eureka.client.registry-fetch-interval-seconds=5
eureka.client.instance-info-replication-interval-seconds=10

########################################
# SWAGGER (SPRINGDOC)
########################################
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=account-service
springdoc.swagger-ui.urls[0].url=/account-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=paper-service
springdoc.swagger-ui.urls[1].url=/paper-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=reading-service
springdoc.swagger-ui.urls[2].url=/reading-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=notification-service
springdoc.swagger-ui.urls[3].url=/notification-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=group-service
springdoc.swagger-ui.urls[4].url=/group-service/v3/api-docs

########################################
# SPRING CLOUD GATEWAY ROUTES
########################################
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# --- ACCOUNT SERVICE (user, role) ---
spring.cloud.gateway.routes[0].id=account-service
spring.cloud.gateway.routes[0].uri=lb://ACCOUNT-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/account-service/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/account-service/(?<segment>.*), /v1/api/${segment}

# --- PAPER SERVICE (paper, annotation, tag, citation) ---
spring.cloud.gateway.routes[1].id=paper-service
spring.cloud.gateway.routes[1].uri=lb://PAPER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/paper-service/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/paper-service/(?<segment>.*), /v1/api/${segment}

# --- NOTIFICATION SERVICE (notification) ---
spring.cloud.gateway.routes[2].id=notification-service
spring.cloud.gateway.routes[2].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/notification-service/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/notification-service/(?<segment>.*), /v1/api/${segment}

# --- READING WORKFLOW SERVICE (reading service) ---
spring.cloud.gateway.routes[3].id=reading-workflow-service
spring.cloud.gateway.routes[3].uri=lb://READING-WORKFLOW-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/reading-service/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/reading-service/(?<segment>.*), /v1/api/${segment}

# --- GROUP SERVICE (collection, team) ---
spring.cloud.gateway.routes[4].id=group-service
spring.cloud.gateway.routes[4].uri=lb://GROUP-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/group-service/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/group-service/(?<segment>.*), /v1/api/${segment}

########################################
# FRONTEND URL CONFIGURATION
########################################
frontend.url=http://localhost:3000

