########################################
# ? GATEWAY SERVICE CONFIGURATION
########################################
server.port=8080
spring.application.name=gateway-service
spring.cloud.compatibility-verifier.enabled=false

########################################
# ? EUREKA CLIENT CONFIGURATION
########################################
# Trỏ đến tất cả các instance của Eureka Server để tăng tính sẵn sàng cao
eureka.client.service-url.defaultZone=http://localhost:9001/eureka/,http://localhost:9002/eureka/,http://localhost:9003/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

########################################
# ? SWAGGER (SPRINGDOC)
########################################
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

########################################
# ? SPRING CLOUD GATEWAY DISCOVERY
########################################
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

########################################
# ? SPRING CLOUD GATEWAY ROUTES
########################################

# --- BOOK SERVICE ROUTE ---
spring.cloud.gateway.routes[0].id=book-service
spring.cloud.gateway.routes[0].uri=lb://BOOK-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/books/**, /api/bookshelves/**, /api/reviews/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/(?<segment>.*), /${segment}

# --- FINE SERVICE ROUTE ---
spring.cloud.gateway.routes[1].id=fine-service
spring.cloud.gateway.routes[1].uri=lb://FINE-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/fines/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/(?<segment>.*), /${segment}

# --- LOAN SERVICE ROUTE ---
spring.cloud.gateway.routes[2].id=loan-service
spring.cloud.gateway.routes[2].uri=lb://LOAN-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/loans/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/api/(?<segment>.*), /${segment}

# --- USER SERVICE ROUTE ---
spring.cloud.gateway.routes[3].id=user-service
spring.cloud.gateway.routes[3].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/users/**, /api/roles/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/api/(?<segment>.*), /${segment}

# --- NOTIFICATION SERVICE ROUTE ---
spring.cloud.gateway.routes[4].id=notification-service
spring.cloud.gateway.routes[4].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/api/(?<segment>.*), /${segment}