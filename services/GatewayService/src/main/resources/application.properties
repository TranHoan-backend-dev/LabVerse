########################################
# ? GATEWAY SERVICE CONFIGURATION
########################################
server.port=8080
spring.application.name=gateway-service
spring.cloud.compatibility-verifier.enabled=false

########################################
# ? EUREKA CLIENT CONFIGURATION
########################################
# Trỏ đến tất cả các instance của Eureka Server để tăng tính sẵn sàng cao
eureka.client.service-url.defaultZone=http://localhost:9001/eureka/
# ,http://localhost:9002/eureka/,http://localhost:9003/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Refresh registry more frequently để phát hiện service mới nhanh hơn
eureka.client.registry-fetch-interval-seconds=5
eureka.client.instance-info-replication-interval-seconds=10

########################################
# ? SWAGGER (SPRINGDOC)
########################################
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

########################################
# ? SPRING CLOUD GATEWAY DISCOVERY
########################################
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

########################################
# ? SPRING CLOUD GATEWAY ROUTES
# ? Each path pattern needs a separate predicate
########################################
# --- ACCOUNT SERVICE ROUTE ---
# (user, role)
spring.cloud.gateway.routes[0].id=account-service
spring.cloud.gateway.routes[0].uri=lb://ACCOUNT-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/v1/api/users/**
spring.cloud.gateway.routes[0].predicates[1]=Path=/v1/api/roles/**

# --- PAPER SERVICE ROUTE ---
# (paper, annotation, tag, citation)
spring.cloud.gateway.routes[1].id=paper-service
spring.cloud.gateway.routes[1].uri=lb://PAPER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/v1/api/papers/**
spring.cloud.gateway.routes[1].predicates[1]=Path=/v1/api/annotations/**
spring.cloud.gateway.routes[1].predicates[2]=Path=/v1/api/tags/**
spring.cloud.gateway.routes[1].predicates[3]=Path=/v1/api/citations/**

spring.cloud.gateway.routes[7].id=group-service-collections-exact
spring.cloud.gateway.routes[7].uri=lb://PAPER-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/v1/api/papers


# --- GROUP SERVICE COLLECTIONS ROUTE (Exact Path) ---
# Match exact path /v1/api/collections (không có sub-path)
spring.cloud.gateway.routes[2].id=group-service-collections-exact
spring.cloud.gateway.routes[2].uri=lb://GROUP-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/v1/api/collections

# --- GROUP SERVICE COLLECTIONS ROUTE (Sub-paths) ---
# Match tất cả paths bắt đầu bằng /v1/api/collections/
spring.cloud.gateway.routes[3].id=group-service-collections-subpaths
spring.cloud.gateway.routes[3].uri=lb://GROUP-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/v1/api/collections/**

# --- GROUP SERVICE USERS ROUTE ---
spring.cloud.gateway.routes[4].id=group-service-users
spring.cloud.gateway.routes[4].uri=lb://GROUP-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/v1/api/group-users/**

# --- NOTIFICATION SERVICE ROUTE ---
spring.cloud.gateway.routes[5].id=notification-service
spring.cloud.gateway.routes[5].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/v1/api/notifications/**

# --- READING WORKFLOW SERVICE ROUTE ---
# (reading list, reading workflow)
spring.cloud.gateway.routes[6].id=reading-workflow-service
spring.cloud.gateway.routes[6].uri=lb://READING-WORKFLOW-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/v1/api/reading-lists/**
spring.cloud.gateway.routes[6].predicates[1]=Path=/v1/api/reading-workflows/**

