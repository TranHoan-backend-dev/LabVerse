########################################
# ? GATEWAY SERVICE CONFIGURATION
########################################
spring.application.name=GatewayService
server.port=8080

########################################
# ? SWAGGER (SPRINGDOC)
########################################
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
spring.cloud.compatibility-verifier.enabled=false

########################################
# ? SPRING CLOUD GATEWAY
########################################
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true


########################################
# ? BOOK SERVICE (8081?8085)
########################################
spring.cloud.gateway.routes[0].id=book-service-1
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/books/**,/api/bookshelves/**,/api/reviews/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/(?<segment>.*), /${segment}

